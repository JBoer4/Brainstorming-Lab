name: Stock Monitor

on:
  schedule:
    - cron: '0 14 * * 1-5'  # ~9am ET weekdays (adjust for DST if needed)
  workflow_dispatch:          # allows manual run from the Actions tab

jobs:
  check-stocks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r finance/stock-monitor/requirements.txt

      - name: Run stock monitor
        env:
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python finance/stock-monitor/monitor.py
